name: Daily scrape

# Fetches new posts from every source and stages them in kb/_inbox/ for classification.
# Deliberately does NOT classify or file — that is the agent's job (see
# .claude/skills/organize-kb). This job needs no API key.
on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily — before the classify routine
  workflow_dispatch:       # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: kb-writer         # never let a scrape race the classify routine's push
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install scraper
        run: pip install -e .

      # state.jsonl (committed) hydrates the local SQLite cache automatically,
      # so a fresh runner knows what we have already fetched and skipped.
      - name: Scrape new posts
        run: scraper update | tee scrape.log

      # Papers are GATED: this ingests only arXiv links a human put in papers.txt.
      # There is no paper discovery — nothing enters the KB on its own.
      - name: Ingest queued arXiv papers
        run: scraper papers | tee -a scrape.log

      - name: Summarize
        run: |
          {
            echo '## Daily scrape'
            echo '```'
            grep -E '^==|discovered|state:' scrape.log || true
            echo '```'
            echo "**Staged for classification:** $(ls kb/_inbox/*.md 2>/dev/null | wc -l)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit new articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kb/_inbox state.jsonl papers.txt
          if git diff --cached --quiet; then
            echo "No new posts today."
            exit 0
          fi
          n=$(ls kb/_inbox/*.md 2>/dev/null | wc -l)
          git commit -m "Daily scrape: $n article(s) staged for classification"
          # Rebase in case the classify routine pushed while we were fetching.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
