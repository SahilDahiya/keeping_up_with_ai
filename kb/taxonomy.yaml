# Controlled topic tree for the knowledge base.
# The classifier (Claude via /organize-kb) must pick from this — no invented labels.
# Adding a subtopic is cheap. To restructure: edit here, re-assign the affected
# articles' frontmatter, then run `scraper migrate` (moves files, fixes state, reindexes).
rev: 2

topics:
  agents:
    - tool-use
    - harness            # how an agent system is ASSEMBLED: scaffolds, loops, action
                         # representation (code-actions vs JSON), sub-agent orchestration.
                         # Distinct from `planning`, which is how the agent decides.
    - multi-agent
    - memory-context
    - planning
    - computer-use
  models:
    - releases
    - architectures      # model design itself (transformers, SSMs, MoE, attention variants)
    - training           # pretraining, optimizers, scaling laws, data curation
    - benchmarks         # RESULTS about a model. Benchmark *construction* lives in
                         # evals-observability/benchmark-design.
    - fine-tuning        # adapting an existing model (LoRA, SFT, distillation)
    - reinforcement-learning
    - reasoning
    - multimodal
  inference:
    - optimization       # general latency/throughput work: batching, cold starts,
                         # routing, end-to-end serving performance
    - kernels            # the compute layer: FlashAttention, Triton, torch.compile,
                         # AOT compilation, fused/sparse attention kernels
    - speculative-decoding  # draft models, MTP, EAGLE/Medusa-style acceleration
    - serving
    - hardware
    - quantization
  prompt-engineering:
    - techniques
    - context-engineering
    - structured-output
  rag-retrieval:
    - pipelines
    - embeddings
    - search
  evals-observability:
    - evaluation         # evaluating YOUR system: app/agent evals, production logs ->
                         # eval datasets, regression suites, eval maturity
    - benchmark-design   # building the benchmark itself: leaderboards, contamination
                         # resistance, held-out splits, scoring metrics
    - llm-as-judge       # judge/scorer design: rubrics, evaluator templates, judge
                         # reliability and cost
    - tracing
    - monitoring
    - testing
  infra-platform:
    - gpu-clusters
    - deployment
    - cost
    - edge
  product-engineering:
    - ux-patterns
    - case-studies
    - architecture
    - security
  industry:
    - trends
    - business
    - announcements
